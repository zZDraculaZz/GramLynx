limits:
  max_body_bytes: 1048576
  max_text_chars: 20000

policies:
  strict:
    max_changed_char_ratio: 0.02
    pz_buffer_chars: 2
    enabled_stages:
      - s1_normalize
      - s2_segment
      - s6_guardrails
      - s7_assemble
  smart:
    max_changed_char_ratio: 0.1
    pz_buffer_chars: 1
    enabled_stages:
      - s1_normalize
      - s2_segment
      - s3_spelling
      - s4_grammar
      - s5_punct
      - s6_guardrails
      - s7_assemble

lexicon:
  allowlist:
    - Python
    - FastAPI
    - Docker
  denylist:
    - TODO
    - FIXME


rulepack:
  typo_map_strict:
    непревильно: правильно
    оканчяние: окончание
  typo_map_smart:
    непревильно: правильно
    оканчяние: окончание
    абажаю: обожаю
    севодня: сегодня
  typo_map_strict_ru:
    непревильно: правильно
  typo_map_smart_ru:
    непревильно: правильно
    абажаю: обожаю
  safe_normalize:
    collapse_spaces: true
    trim_line_edges: true
    collapse_blank_lines: true
  punctuation:
    fix_space_before: true
    fix_space_after: true
  punctuation_spacing_ru:
    fix_space_before: true
    fix_space_after: true

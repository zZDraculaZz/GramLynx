limits:
  max_body_bytes: 1048576
  max_text_chars: 20000

policies:
  strict:
    max_changed_char_ratio: 0.02
    pz_buffer_chars: 2
    enabled_stages:
      - s1_normalize
      - s2_segment
      - s6_guardrails
      - s7_assemble
  smart:
    max_changed_char_ratio: 0.1
    pz_buffer_chars: 1
    enabled_stages:
      - s1_normalize
      - s2_segment
      - s3_spelling
      - s4_grammar
      - s5_punct
      - s6_guardrails
      - s7_assemble

lexicon:
  allowlist:
    - Python
    - FastAPI
    - Docker
  denylist:
    - TODO
    - FIXME


rulepack:
  enable_morph_safety_ru: false
  typo_map_strict:
    непревильно: неправильно
    оканчяние: окончание
  typo_map_smart:
    непревильно: неправильно
    оканчяние: окончание
    абажаю: обожаю
    севодня: сегодня
  typo_map_strict_ru:
    непревильно: неправильно
    севодня: сегодня
    сегодя: сегодня
    пачему: почему
    пожалуста: пожалуйста
    пажалуста: пожалуйста
    извените: извините
    сдесь: здесь
    кстате: кстати
    учавствовать: участвовать
    будующий: будущий
    раскажи: расскажи
    проблемма: проблема
    черезчур: чересчур
  typo_map_smart_ru:
    непревильно: неправильно
    абажаю: обожаю
    севодня: сегодня
    сегодя: сегодня
    пачему: почему
    пожалуста: пожалуйста
    пажалуста: пожалуйста
    извените: извините
    сдесь: здесь
    кстате: кстати
    учавствовать: участвовать
    будующий: будущий
    раскажи: расскажи
    проблемма: проблема
    черезчур: чересчур
    превет: привет
    спосибо: спасибо
    кагда: когда
    жызнь: жизнь
    слишкам: слишком
    извеняюсь: извиняюсь
    симпотичный: симпатичный
    агенство: агентство
    прийдти: прийти
    нечайно: нечаянно
    вообше: вообще
    преобретение: приобретение
    помоему: по-моему
    всетаки: все-таки
    ктото: кто-то
    чтото: что-то
    какойто: какой-то
    гдето: где-то
    когдато: когда-то
    почемуто: почему-то
    зачемто: зачем-то
    отчегото: отчего-то
    изза: из-за
    изпод: из-под
  no_touch_strict_ru:
    - ща
    - ваще
    - имхо
  no_touch_smart_ru:
    - ща
    - ваще
    - имхо
    - сорян
    - кринж
  no_touch_prefixes_ru:
    - "@"
    - "#"
  safe_normalize:
    collapse_spaces: true
    trim_line_edges: true
    collapse_blank_lines: true
  punctuation:
    fix_space_before: true
    fix_space_after: true
  punctuation_spacing_ru:
    fix_space_before: true
    fix_space_after: true
